<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Socios del Club</title>

    <link rel="stylesheet" href="./styles/themes.css">

    <!-- Importar componentes de autenticación y dashboard -->
    <script type="module" src="./components/login-form.js"></script>
    <script type="module" src="./components/register-form.js"></script>
    <script type="module" src="./components/dashboard-manager.js"></script>
    <!-- NOTA: member-list.js se eliminó por ahora ya que la gestión inicial es de autenticación. Se reintroducirá más tarde. -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--club-texto);
            line-height: 1.6;
            background:
                radial-gradient(circle at 15% 12%, rgba(255, 255, 255, 0.35), transparent 24%),
                radial-gradient(circle at 85% 18%, rgba(0, 174, 239, 0.32), transparent 30%),
                linear-gradient(135deg, #002f4f 0%, #006fae 42%, #00aeef 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(120deg, transparent 0 18%, rgba(255, 255, 255, 0.13) 18% 24%, transparent 24% 100%),
                linear-gradient(120deg, transparent 0 54%, rgba(255, 255, 255, 0.10) 54% 58%, transparent 58% 100%),
                linear-gradient(120deg, transparent 0 72%, rgba(0, 0, 0, 0.10) 72% 76%, transparent 76% 100%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            width: 520px;
            height: 520px;
            right: -180px;
            bottom: -180px;
            border: 42px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 20px 60px;
            background-color: transparent;
            border-radius: var(--radius-md);
        }

        .club-hero {
            position: relative;
            overflow: hidden;
            color: var(--club-blanco);
            padding: 32px 24px 26px;
            margin-bottom: 0;
            background: transparent;
        }

        .club-hero::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 18px;
            transform: translateX(-50%);
            width: min(920px, calc(100% - 48px));
            height: 140px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 30px;
            background: rgba(0, 27, 46, 0.22);
            backdrop-filter: blur(10px);
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.20);
            pointer-events: none;
        }

        .club-hero__content {
            position: relative;
            max-width: 1100px;
            margin: 0 auto;
            z-index: 1;
        }

        .club-hero__brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
            min-height: 112px;
            text-align: left;
        }

        .club-hero__logo {
            width: 112px;
            height: 112px;
            object-fit: contain;
            background: transparent;
            border-radius: 0;
            padding: 0;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.35));
        }

        .club-hero__eyebrow {
            margin: 0 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.74rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.78);
        }

        .club-hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4.5vw, 3.4rem);
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.055em;
            color: #ffffff;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .club-hero__subtitle {
            margin: 12px 0 0;
            font-size: 1.03rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.88);
        }

        @media (max-width: 640px) {
            .club-hero {
                padding: 28px 18px;
            }

            .club-hero__brand {
                align-items: flex-start;
                gap: 16px;
            }

            .club-hero__logo {
                width: 76px;
                height: 76px;
                border-radius: 18px;
            }
        }

        .auth-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 28px;
        }

        @media (max-width: 760px) {
            .auth-container {
                display: block;
            }
        }

        .auth-toggle {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-toggle button {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.55);
            color: var(--club-azul-oscuro);
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 800;
            margin: 0 6px;
            padding: 11px 20px;
            border-radius: 999px;
            box-shadow: 0 12px 28px rgba(0, 25, 45, 0.20);
            transition: all 0.25s ease;
        }

        .auth-toggle button.active {
            color: var(--club-blanco);
            background: linear-gradient(135deg, #001f35, #006fae);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .auth-toggle button:hover:not(.active) {
            transform: translateY(-1px);
            background: #ffffff;
        }
    </style>
</head>

<body>
    <header class="club-hero">

        <div class="club-hero__content">
            <div class="club-hero__brand">
                <img src="./assets/branding/logo-argentino.png" alt="Logo Club Argentino" class="club-hero__logo">

                <div>
                    <p class="club-hero__eyebrow">Plataforma institucional</p>
                    <h1>Club Atlético Argentino</h1>
                    <p class="club-hero__subtitle">Gestión de socios, cuotas y eventos</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="authSection">
            <div class="auth-toggle">
                <button id="showLogin" class="active">Iniciar Sesión</button>
                <button id="showRegister">Registrarse</button>
            </div>
            <div class="auth-container">
                <login-form id="loginForm"></login-form>
                <register-form id="registerForm" style="display: none;"></register-form>
            </div>
        </div>

        <div id="dashboardSection" style="display: none;">
            <dashboard-manager></dashboard-manager>
        </div>
    </main>

    <script>
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showLoginButton = document.getElementById('showLogin');
        const showRegisterButton = document.getElementById('showRegister');

        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');

            if (token && role) {
                authSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                // Asegurarse de que el dashboard-manager se recargue con el rol correcto
                if (dashboardSection.querySelector('dashboard-manager')) {
                    dashboardSection.querySelector('dashboard-manager').remove();
                }
                const dashboardManager = document.createElement('dashboard-manager');
                dashboardSection.appendChild(dashboardManager);
            } else {
                authSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }
        }

        function showForm(formToShow) {
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            showLoginButton.classList.remove('active');
            showRegisterButton.classList.remove('active');

            if (formToShow === 'login') {
                loginForm.style.display = 'block';
                showLoginButton.classList.add('active');
            } else {
                registerForm.style.display = 'block';
                showRegisterButton.classList.add('active');
            }
        }

        // Event Listeners para los botones de alternar formulario
        showLoginButton.addEventListener('click', () => showForm('login'));
        showRegisterButton.addEventListener('click', () => showForm('register'));

        // Escuchar eventos personalizados de los componentes
        document.addEventListener('login-success', checkAuth);
        document.addEventListener('logout-success', checkAuth);
        document.addEventListener('register-success', () => {
            showForm('login'); // Después del registro exitoso, mostrar el login
            alert('¡Registro exitoso! Por favor, inicia sesión.');
        });

        // Comprobar autenticación al cargar la página
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>

</html>
